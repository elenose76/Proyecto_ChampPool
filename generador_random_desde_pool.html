<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomizador de Champion Pool</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dist-random.css">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #060b13;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(13, 33, 58, 0.4) 0%, transparent 70%),
                radial-gradient(circle at 0% 100%, rgba(10, 20, 38, 0.6) 0%, transparent 50%);
            color: #f0f4f9;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .font-lol-title {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.15em;
        }

        /* Estilos de columnas de roles clásicos */
        .role-container {
            background: rgba(10, 20, 38, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .role-top { border-top: 3px solid #c29c47; }
        .role-jgl { border-top: 3px solid #1ebd62; }
        .role-mid { border-top: 3px solid #288df2; }
        .role-adc { border-top: 3px solid #e6263a; }
        .role-supp { border-top: 3px solid #00cfc8; }

        .champion-btn {
            background-color: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(194, 156, 71, 0.3);
            color: #e2d8c3;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .champion-btn:hover {
            border-color: #c29c47;
            background-color: rgba(30, 41, 59, 0.9);
            color: #fff;
        }

        /* Estética de Baneo */
        .champion-btn.banned {
            border-color: rgba(255, 50, 50, 0.3);
            background-color: rgba(20, 5, 5, 0.5);
            color: #64748b;
            box-shadow: none;
        }

        .champion-btn.banned:hover {
            border-color: rgba(255, 50, 50, 0.7);
            background-color: rgba(40, 10, 10, 0.7);
            color: #94a3b8;
        }

        .champion-btn .champ-img {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .champion-btn.banned .champ-img {
            filter: grayscale(100%) brightness(0.4);
            border-color: rgba(255, 50, 50, 0.5);
        }

        .champion-btn .ban-icon {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .champion-btn.banned .ban-icon {
            opacity: 1;
            transform: scale(1);
        }

        .champion-btn.banned::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,0,0,0.5) 15%, rgba(255,0,0,0.5) 85%, transparent 100%);
            pointer-events: none;
            z-index: 5;
        }

        .hud-container {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-bg-title {
            position: absolute;
            top: -40px;
            font-family: 'Cinzel', serif;
            font-size: 8rem;
            font-weight: 900;
            opacity: 0.03;
            letter-spacing: 0.2em;
            pointer-events: none;
            text-transform: uppercase;
            z-index: 0;
        }

        .hex-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px 20px;
            z-index: 1;
            width: 100%;
        }

        .hex-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            /* Espacio vertical base para que la fila de abajo no pise los nombres */
            margin-bottom: 35px; 
        }

        /* Intercalado perfecto: se mueve la mitad del ancho del hexágono + gap */
        .hex-row.intercalada {
            margin-top: -30px;
        }

        .hex-item {
            position: relative;
            width: 120px;
            height: 138px;
            max-width: 120px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .hex-item:hover {
            transform: scale(1.08);
            z-index: 10;
        }

        .hex-clip {
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: #0f172a;
            overflow: hidden;
            z-index: 2;
        }

        .hex-clip img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.5s ease;
        }

        .hex-border {
            position: absolute;
            inset: 0;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: 1;
            transition: all 0.3s ease;
        }

        .hex-border-top { background: linear-gradient(135deg, #c29c47 0%, #4a3b1a 100%); }
        .hex-border-jgl { background: linear-gradient(135deg, #1ebd62 0%, #0b4724 100%); }
        .hex-border-mid { background: linear-gradient(135deg, #288df2 0%, #0f3b66 100%); }
        .hex-border-adc { background: linear-gradient(135deg, #e6263a 0%, #5c0f17 100%); }
        .hex-border-supp { background: linear-gradient(135deg, #00cfc8 0%, #00524f 100%); }

        .hex-item:hover .hex-border {
            filter: brightness(1.4) drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }

        .hex-item.banned .hex-clip img {
            filter: grayscale(100%) brightness(0.25);
        }

        .hex-item.banned .hex-border {
            background: linear-gradient(135deg, #ef4444 0%, #3f0f0f 100%) !important;
            opacity: 0.4;
        }

        .hex-ban-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            opacity: 0;
            transform: scale(0.6);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .hex-item.banned .hex-ban-overlay {
            opacity: 1;
            transform: scale(1);
        }

        /* Nombres posicionados de forma absoluta abajo para que no afecten al flujo */
        .hex-champ-name {
            position: absolute;
            bottom: -24px;
            left: -10px;
            right: -10px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            text-transform: capitalize;
            letter-spacing: 0.05em;
            color: #e2d8c3;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .lol-divider {
            width: 100%;
            max-width: 400px;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(194, 156, 71, 0.4) 50%, transparent 100%);
            position: relative;
            margin-top: 10px;
        }
        .lol-divider::before {
            content: '';
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 5px; height: 5px;
            background: #c29c47;
            border: 1px solid #060b13;
        }

        /* Botón de acción principal */
        .action-btn {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #c29c47;
            color: #f0f4f9;
            box-shadow: 0 0 15px rgba(194, 156, 71, 0.2);
            transition: all 0.3s;
        }

        .action-btn:hover {
            box-shadow: 0 0 25px rgba(194, 156, 71, 0.5);
            transform: translateY(-2px);
            background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #c29c47; }

        /* Modal result */
        .result-modal {
            background: rgba(2, 6, 12, 0.9);
            backdrop-filter: blur(10px);
        }
        
        .result-box {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            border: 2px solid #c29c47;
            box-shadow: 0 0 40px rgba(194, 156, 71, 0.4);
            position: relative;
            overflow: hidden;
        }

        .splash-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.3;
            background-size: cover;
            background-position: center 20%;
            z-index: 0;
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <header class="text-center w-full max-w-6xl mb-8 relative">
        <div class="flex flex-col items-center mb-6">
            <div id="profile-frame" class="relative w-24 h-24 rounded-full border-4 border-[#c29c47] cursor-pointer group overflow-hidden shadow-2xl transition-all hover:border-[#e2d8c3] hover:scale-105 bg-slate-950">
                <img id="profile-img" src="" class="w-full h-full object-cover hidden">

                    <i class="fa-solid fa-camera text-3xl"></i>

                              placeholder:text-slate-600 placeholder:font-normal">
            </div>

            <div class="mt-2">
                <a href="#"
                   onclick="redirectToDeepLOL(event)"
                   class="text-[10px] bg-yellow-500/10 hover:bg-yellow-500/20 text-yellow-400 
                          border border-yellow-500/30 px-2.5 py-1 rounded transition flex 
                          items-center gap-1 font-semibold hover:border-yellow-500/50
                          justify-center w-48">
                    <i class="fa-solid fa-arrow-up-right-from-square text-[9px]"></i>
                    VER PERFIL DEEPLOL
                </a>
            </div>
        </div>

        <h1 class="text-3xl md:text-5xl font-lol-title text-transparent bg-clip-text bg-gradient-to-r from-yellow-100 via-yellow-400 to-amber-600 font-black mb-6">
            RANDOMIZADOR DE POOL
        </h1>
        
        <div class="flex flex-wrap justify-center gap-3">
            <a href="index.html" class="bg-slate-900 border border-green-500/40 text-green-400 text-xs font-bold py-2 px-4 rounded hover:bg-green-500/10 transition flex items-center gap-2">
                <i class="fa-solid fa-pen-to-square"></i> CREAR / EDITAR POOL
            </a>
            
            <button onclick="loadFromLocalStorage()" class="bg-slate-900 border border-blue-500/40 text-blue-400 text-xs font-bold py-2 px-4 rounded hover:bg-blue-500/10 transition flex items-center gap-2">
                <i class="fa-solid fa-rotate"></i> AUTO-CARGAR (LOCAL)
            </button>
            <button onclick="document.getElementById('import-file').click()" class="bg-slate-900 border border-yellow-500/40 text-yellow-400 text-xs font-bold py-2 px-4 rounded hover:bg-yellow-500/10 transition flex items-center gap-2">
                <i class="fa-solid fa-file-import"></i> IMPORTAR JSON
            </button>
            <input type="file" id="import-file" class="hidden" accept=".json" onchange="importJSON(event)">
        </div>
        
        <div id="status-message" class="mt-4 text-sm font-semibold text-gray-400">
            <i class="fa-solid fa-spinner animate-spin text-yellow-500"></i> Cargando datos de Riot Games...

    <section class="flex flex-col sm:flex-row gap-4 mb-8 w-full max-w-3xl justify-center items-center bg-slate-900/50 p-6 rounded-xl border border-slate-800">
        <div class="flex flex-col w-full sm:w-auto relative" id="custom-role-dropdown">
            <label class="text-xs text-gray-400 mb-1 font-bold uppercase tracking-widest">Elige el rol a jugar:</label>
            
            <input type="hidden" id="role-select" value="any">
            
            <button type="button" id="dropdown-btn" onclick="toggleDropdown()" class="bg-[#0f172a] border border-[#334155] text-white p-3 rounded focus:outline-none focus:border-[#c29c47] font-semibold min-w-[220px] flex items-center justify-between transition-colors">
                <span id="dropdown-selected-text" class="flex items-center gap-2">
                    <i class="fa-solid fa-dice text-purple-400"></i> <span class="text-white">ROL ALEATORIO</span>
                </span>
                <i class="fa-solid fa-chevron-down text-gray-500 text-xs"></i>
            </button>

            <ul id="dropdown-menu" class="absolute top-[100%] left-0 w-full mt-1 bg-[#0f172a] border border-[#334155] rounded shadow-xl hidden overflow-hidden z-20">
                <li onclick="selectRole('any', '<i class=\'fa-solid fa-dice text-purple-400\'></i> <span class=\'text-white\'>ROL ALEATORIO</span>')" class="p-3 hover:bg-[#1e293b] cursor-pointer flex items-center gap-2 font-semibold text-white transition-colors">
                    <i class="fa-solid fa-dice text-purple-400"></i> ROL ALEATORIO

                <li onclick="selectRole('top', '<i class=\'fa-solid fa-shield-halved text-[#c29c47]\'></i> <span class=\'text-[#c29c47]\'>TOP</span>')" class="p-3 hover:bg-[#1e293b] cursor-pointer flex items-center gap-2 font-semibold text-[#c29c47] transition-colors border-t border-slate-800">
                    <i class="fa-solid fa-shield-halved"></i> TOP
                </li>
                <li onclick="selectRole('jgl', '<i class=\'fa-solid fa-tree text-[#1ebd62]\'></i> <span class=\'text-[#1ebd62]\'>JUNGLA</span>')" class="p-3 hover:bg-[#1e293b] cursor-pointer flex items-center gap-2 font-semibold text-[#1ebd62] transition-colors border-t border-slate-800">
                    <i class="fa-solid fa-tree"></i> JUNGLA
                </li>
                <li onclick="selectRole('mid', '<i class=\'fa-solid fa-wand-magic-sparkles text-[#288df2]\'></i> <span class=\'text-[#288df2]\'>MID</span>')" class="p-3 hover:bg-[#1e293b] cursor-pointer flex items-center gap-2 font-semibold text-[#288df2] transition-colors border-t border-slate-800">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> MID
                </li>
                <li onclick="selectRole('adc', '<i class=\'fa-solid fa-crosshairs text-[#e6263a]\'></i> <span class=\'text-[#e6263a]\'>ADC</span>')" class="p-3 hover:bg-[#1e293b] cursor-pointer flex items-center gap-2 font-semibold text-[#e6263a] transition-colors border-t border-slate-800">
                    <i class="fa-solid fa-crosshairs"></i> ADC
                </li>
                <li onclick="selectRole('supp', '<i class=\'fa-solid fa-hand-holding-hand text-[#00cfc8]\'></i> <span class=\'text-[#00cfc8]\'>SUPPORT</span>')" class="p-3 hover:bg-[#1e293b] cursor-pointer flex items-center gap-2 font-semibold text-[#00cfc8] transition-colors border-t border-slate-800">
                    <i class="fa-solid fa-hand-holding-hand"></i> SUPPORT
                </li>
            </ul>
        </div>
        
        <button id="generate-btn" onclick="generateRandomChampion()" class="action-btn px-8 py-3 rounded font-bold uppercase tracking-widest text-lg h-[50px] mt-0 sm:mt-5 flex-grow sm:flex-grow-0 flex justify-center items-center gap-2">
            <i class="fa-solid fa-dice"></i> FIJAR CAMPEÓN
        </button>
    </section>

    <main class="w-full max-w-6xl mb-12" id="roles-container">
        </main>

    <div id="result-modal" class="result-modal fixed inset-0 flex items-center justify-center hidden z-50 p-4">
        <div class="result-box rounded-xl text-center max-w-md w-full transform scale-95 opacity-0 transition-all duration-300 shadow-2xl" id="result-content">
            <div id="splash-background" class="splash-bg"></div>
            
            <div class="p-8 relative z-10 flex flex-col items-center">
                <div id="result-icon" class="text-4xl mb-2"></div>
                <h2 class="text-lg font-bold mb-4 tracking-widest uppercase" id="result-role">ROL</h2>
                
                <img id="result-img" src="" class="w-24 h-24 rounded-full border-4 border-[#c29c47] shadow-[0_0_15px_rgba(194,156,71,0.6)] mb-4 object-cover" onerror="this.style.display='none'">
                
                <div class="text-4xl md:text-5xl font-lol-title font-black mb-2 text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-400 drop-shadow-lg" id="result-champion">CAMPEÓN</div>
                <p id="result-title" class="text-sm italic text-yellow-500/80 mb-8 font-serif">Título del campeón</p>

                <div class="flex flex-col sm:flex-row gap-3 w-full justify-center mt-4">
                    <a id="opgg-link" href="#" target="_blank" class="bg-[#5383e8] hover:bg-[#436ac0] text-white border border-[#5383e8]/50 shadow-[0_0_15px_rgba(83,131,232,0.3)] px-6 py-2 rounded font-semibold tracking-widest text-xs flex items-center justify-center gap-2 transition-all hover:-translate-y-0.5">
                        <i class="fa-solid fa-chart-simple"></i> VER BUILD (OP.GG)
                    </a>
                    <button onclick="closeModal()" class="action-btn px-6 py-2 rounded font-semibold tracking-widest text-xs flex items-center justify-center">
                        ACEPTAR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ddragonVersion = "14.4.1";
        let riotChampionsData = {};
        
        const internalRoles = ['top', 'jgl', 'mid', 'adc', 'supp'];
        const roleInfo = {
            top:  { name: 'TOP', icon: '<i class="fa-solid fa-shield-halved"></i>', color: 'text-[#c29c47]', class: 'role-top', borderHex: 'hex-border-top' },
            jgl:  { name: 'JUNGLA', icon: '<i class="fa-solid fa-tree"></i>', color: 'text-[#1ebd62]', class: 'role-jgl', borderHex: 'hex-border-jgl' },
            mid:  { name: 'MID', icon: '<i class="fa-solid fa-wand-magic-sparkles"></i>', color: 'text-[#288df2]', class: 'role-mid', borderHex: 'hex-border-mid' },
            adc:  { name: 'ADC', icon: '<i class="fa-solid fa-crosshairs"></i>', color: 'text-[#e6263a]', class: 'role-adc', borderHex: 'hex-border-adc' },
            supp: { name: 'SUPPORT', icon: '<i class="fa-solid fa-hand-holding-hand"></i>', color: 'text-[#00cfc8]', class: 'role-supp', borderHex: 'hex-border-supp' }
        };

        let combinedPool = { top: new Set(), jgl: new Set(), mid: new Set(), adc: new Set(), supp: new Set() };
        let activeChampions = { top: new Set(), jgl: new Set(), mid: new Set(), adc: new Set(), supp: new Set() };

        window.onload = async function() {
            try {
                const response = await fetch(`https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/data/es_ES/champion.json`);
                const data = await response.json();
                riotChampionsData = data.data;
                document.getElementById('status-message').innerHTML = `<i class="fa-solid fa-check text-green-500"></i> Conectado a base de datos de Riot Games`;
                loadFromLocalStorage();
            } catch (error) {
                console.error(error);
                document.getElementById('status-message').innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-500"></i> Error conectando a Riot Games.`;
            }
        };

        function processBuilderData(userPool, userCounters) {
            let totalChampions = 0;
            internalRoles.forEach(r => {
                combinedPool[r].clear();
                activeChampions[r].clear();
            });

            internalRoles.forEach(role => {
                if (userPool && userPool[role]) {
                    userPool[role].forEach(champ => { if (champ) combinedPool[role].add(champ); });
                }
                if (userCounters && userCounters[role]) {
                    userCounters[role].forEach(champ => { if (champ) combinedPool[role].add(champ); });
                }
                combinedPool[role].forEach(champ => {
                    activeChampions[role].add(champ);
                    totalChampions++;
                });
            });

            if (totalChampions === 0) {
                document.getElementById('status-message').innerHTML = `<i class="fa-solid fa-circle-info text-blue-400"></i> No se encontraron campeones. <a href="champion_pool_league_of_legends (2).html" class="text-green-400 hover:underline hover:text-green-300">Ve al Creador para elegirlos</a>`;
            } else {
                document.getElementById('status-message').innerHTML = `<i class="fa-solid fa-check text-green-500"></i> ¡${totalChampions} campeones cargados correctamente!`;
            }

            renderUI();
        }

        function loadFromLocalStorage() {
            const storedPool = localStorage.getItem('lol_champion_pool_data');
            const storedCounters = localStorage.getItem('lol_champion_pool_counters');
            let p = storedPool ? JSON.parse(storedPool) : null;
            let c = storedCounters ? JSON.parse(storedCounters) : null;
            processBuilderData(p, c);
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    processBuilderData(parsed.userPool, parsed.userCounters);
                } catch (err) {
                    alert("Archivo JSON no válido.");
                }
            };
            reader.readAsText(file);
        }

        /* CONTROLADOR DE RENDERIZACIÓN */
        function renderUI() {
            const container = document.getElementById('roles-container');
            const selectedRole = document.getElementById('role-select').value;

            if (selectedRole === 'any') {
                renderAllRolesClassic(container);
            } else {
                renderSingleRolePremiumHUD(container, selectedRole);
            }
        }

        /* VISTA ORIGINAL (5 Columnas) */
        function renderAllRolesClassic(container) {
            container.className = "w-full max-w-6xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-12";
            container.innerHTML = '';

            internalRoles.forEach(role => {
                const champions = Array.from(combinedPool[role]).sort();
                const col = document.createElement('div');
                col.className = `role-container ${roleInfo[role].class} p-5 rounded-xl flex flex-col min-h-[600px] h-[650px] shadow-lg`;

                const header = document.createElement('div');
                header.className = 'flex items-center justify-between mb-4 border-b border-slate-700 pb-3';
                header.innerHTML = `
                    <div class="flex items-center gap-2 ${roleInfo[role].color}">
                        <div class="text-xl">${roleInfo[role].icon}</div>
                        <h2 class="text-lg font-bold font-lol-title">${roleInfo[role].name}</h2>
                    </div>
                    <span class="text-xs bg-slate-800 px-2 py-1 rounded text-gray-400" id="count-${role}">
                        ${activeChampions[role].size}/${champions.length}
                    </span>
                `;
                col.appendChild(header);

                const listContainer = document.createElement('div');
                listContainer.className = 'overflow-y-auto flex-grow pr-2 flex flex-col gap-2';

                if (champions.length === 0) {
                    listContainer.innerHTML = `
                        <div class="text-xs text-gray-500 text-center mt-10 flex flex-col items-center gap-3">
                            <span>Sin campeones.</span>
                        </div>`;
                } else {
                    const toggleBtn = document.createElement('button');
                    toggleBtn.className = 'w-full flex items-center justify-center gap-3 py-2 px-3 mb-3 text-[10px] font-bold text-gray-400 hover:text-white border border-slate-700 hover:border-slate-500 rounded bg-slate-800/30 transition-all uppercase tracking-wider';
                    toggleBtn.innerHTML = '<i class="fa-solid fa-check-double"></i> Activar/Desactivar Todos';
                    toggleBtn.onclick = () => { toggleAll(role, champions); renderUI(); };
                    listContainer.appendChild(toggleBtn);

                    champions.forEach(champId => {
                        const champData = riotChampionsData[champId];
                        const champName = champData ? champData.name : champId;
                        const iconUrl = champData ? `https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/img/champion/${champId}.png` : '';

                        const btn = document.createElement('button');
                        btn.className = 'champion-btn w-full text-left p-2 rounded text-xs font-semibold flex justify-between items-center group';
                        if (!activeChampions[role].has(champId)) btn.classList.add('banned');

                        btn.innerHTML = `
                            <div class="flex items-center gap-3 w-full relative z-10">
                                <div class="relative flex-shrink-0">
                                    ${iconUrl ? `<img src="${iconUrl}" class="champ-img">` : `<div class="champ-img bg-slate-800"></div>`}
                                    <div class="ban-icon absolute inset-0 flex items-center justify-center pointer-events-none">
                                        <i class="fa-solid fa-ban text-red-500 text-lg drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)]"></i>
                                    </div>
                                </div>
                                <span class="truncate">${champName}</span>
                            </div>
                        `;

                        btn.onclick = () => { toggleChampion(role, champId); btn.classList.toggle('banned', !activeChampions[role].has(champId)); document.getElementById(`count-${role}`).textContent = `${activeChampions[role].size}/${combinedPool[role].size}`; };
                        listContainer.appendChild(btn);
                    });
                }
                col.appendChild(listContainer);
                container.appendChild(col);
            });
        }

        /* NUEVA VISTA HUD PREMIUM (Hexágonos Intercalados) */
        function renderSingleRolePremiumHUD(container, role) {
            container.className = "w-full max-w-5xl mb-12";
            container.innerHTML = '';

            const champions = Array.from(combinedPool[role]).sort();
            const rInfo = roleInfo[role];

            // Maquetación base HUD
            const hudWrapper = document.createElement('div');
            hudWrapper.className = 'hud-container';

            // Título de fondo gigante decorativo (estilo LoL client)
            const bgTitle = document.createElement('div');
            bgTitle.className = 'hud-bg-title';
            bgTitle.textContent = rInfo.name;
            hudWrapper.appendChild(bgTitle);

            // Cabecera Premium
            const header = document.createElement('div');
            header.className = 'text-center flex flex-col items-center mb-4 z-10';
            header.innerHTML = `
                <span class="text-xs uppercase tracking-[0.3em] text-gray-500 font-bold">Tu Selección Personal</span>
                <h2 class="text-4xl font-black font-lol-title ${rInfo.color} flex items-center gap-3 mt-1">
                    ${rInfo.icon} ${rInfo.name}
                </h2>
                <div class="lol-divider"></div>
                <div class="flex items-center gap-4 mt-4">
                    <span class="text-xs bg-slate-900/80 border border-slate-700/50 px-3 py-1 rounded-full text-gray-300 font-semibold">
                        Activos: ${activeChampions[role].size} / ${champions.length}<br>
                    </span>
                    <button id="hud-toggle-all" class="text-[10px] uppercase font-bold tracking-wider px-3 py-1 bg-slate-800/40 border border-slate-700 text-gray-400 hover:text-white hover:border-slate-500 rounded transition-all">
                        <i class="fa-solid fa-check-double mr-1"></i> Alternar Todos
                    </button>
                </div>
            `;
            hudWrapper.appendChild(header);

            header.querySelector('#hud-toggle-all').onclick = () => {
                toggleAll(role, champions);
                renderSingleRolePremiumHUD(container, role);
            };

            // Zona colmena de Hexágonos
            const hexGrid = document.createElement('div');
            hexGrid.className = 'hex-grid';

            if (champions.length === 0) {
                hexGrid.innerHTML = `<div class="text-sm text-gray-500 mt-8 font-medium">No hay campeones seleccionados para este rol en tu Pool.</div>`;
            } else {
                // Algoritmo estructural para intercalar filas (5 arriba, 4 abajo, etc.)
                let index = 0;
                let filaPar = false;

                while (index < champions.length) {
                    const rowSize = filaPar ? 4 : 5; // Alterna filas de 5 y 4
                    const slice = champions.slice(index, index + rowSize);
                    
                    const rowDiv = document.createElement('div');
                    rowDiv.className = `hex-row ${filaPar ? 'intercalada' : ''}`;

                    slice.forEach(champId => {
                        const champData = riotChampionsData[champId];
                        const champName = champData ? champData.name : champId;
                        // Imagen de carga vertical (loading) o splash recortada para que encaje mejor en el hexágono
                        const imgUrl = champId ? `https://ddragon.leagueoflegends.com/cdn/img/champion/loading/${champId}_0.jpg` : '';

                        const hexItem = document.createElement('div');
                        hexItem.className = 'hex-item';
                        if (!activeChampions[role].has(champId)) hexItem.classList.add('banned');

                        hexItem.innerHTML = `
    <div class="hex-border ${rInfo.borderHex}"></div>
    <div class="hex-clip">
        <img src="${imgUrl}" alt="${champName}" title="${champName}">
        <div class="hex-ban-overlay">
            <i class="fa-solid fa-ban text-red-500 text-3xl drop-shadow-[0_2px_6px_rgba(0,0,0,0.95)]"></i>
        </div>
    </div>
`;

                        // Alternar baneo al hacer clic directo en el hexágono
                        hexItem.onclick = () => {
                            toggleChampion(role, champId);
                            hexItem.classList.toggle('banned', !activeChampions[role].has(champId));
                            // Actualizar contadores de cabecera sin redibujar todo
                            header.querySelector('span').textContent = `Activos: ${activeChampions[role].size} / ${champions.length}`;
                        };

                        rowDiv.appendChild(hexItem);
                    });

                    hexGrid.appendChild(rowDiv);
                    index += rowSize;
                    filaPar = !filaPar;
                }
            }

            hudWrapper.appendChild(hexGrid);
            container.appendChild(hudWrapper);
        }

        function toggleChampion(role, champId) {
            if (activeChampions[role].has(champId)) {
                activeChampions[role].delete(champId);
            } else {
                activeChampions[role].add(champId);
            }
        }

        function toggleAll(role, champions) {
            const isAllActive = activeChampions[role].size === champions.length;
            if (isAllActive) {
                activeChampions[role].clear();
            } else {
                activeChampions[role].clear();
                champions.forEach(c => activeChampions[role].add(c));
            }
        }

        function generateRandomChampion() {
            const roleSelect = document.getElementById('role-select').value;
            let targetRole = roleSelect;

            if (roleSelect === 'any') {
                const rolesWithChamps = internalRoles.filter(r => activeChampions[r].size > 0);
                if (rolesWithChamps.length === 0) {
                    showError("¡No hay campeones activos en ningún rol!");
                    return;
                }
                targetRole = rolesWithChamps[Math.floor(Math.random() * rolesWithChamps.length)];
            } else {
                if (activeChampions[targetRole].size === 0) {
                    showError(`No hay campeones activos para el rol: ${roleInfo[targetRole].name}`);
                    return;
                }
            }

            const champsArray = Array.from(activeChampions[targetRole]);
            const selectedChampId = champsArray[Math.floor(Math.random() * champsArray.length)];

            showResult(targetRole, selectedChampId);
        }

        function showResult(role, champId) {
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('result-content');
            actualizarBotonOpgg(champId);
            const champData = riotChampionsData[champId];
            const rInfo = roleInfo[role];
            
            document.getElementById('result-role').innerHTML = `${rInfo.name}`;
            document.getElementById('result-role').className = `text-lg font-bold mb-4 tracking-widest uppercase ${rInfo.color}`;
            document.getElementById('result-icon').innerHTML = rInfo.icon;
            document.getElementById('result-icon').className = `text-4xl mb-2 ${rInfo.color}`;
            
            const nameEl = document.getElementById('result-champion');
            const titleEl = document.getElementById('result-title');
            const imgEl = document.getElementById('result-img');
            const bgEl = document.getElementById('splash-background');

            if (champData) {
                nameEl.textContent = champData.name;
                titleEl.textContent = capitalize(champData.title);
                imgEl.src = `https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/img/champion/${champId}.png`;
                imgEl.style.display = 'block';
                bgEl.style.backgroundImage = `url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${champId}_0.jpg')`;
                nameEl.className = "text-4xl md:text-5xl font-lol-title font-black mb-2 text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-400 drop-shadow-lg";
            } else {
                nameEl.textContent = champId;
                titleEl.textContent = "Campeón Desconocido";
                imgEl.style.display = 'none';
                bgEl.style.backgroundImage = 'none';
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function showError(msg) {
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('result-content');
            
            document.getElementById('result-role').textContent = "ADVERTENCIA";
            document.getElementById('result-role').className = "text-lg font-bold mb-4 tracking-widest uppercase text-red-500";
            document.getElementById('result-icon').innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
            document.getElementById('result-icon').className = "text-4xl mb-2 text-red-500";
            document.getElementById('result-img').style.display = 'none';
            document.getElementById('splash-background').style.backgroundImage = 'none';
            
            const nameEl = document.getElementById('result-champion');
            nameEl.textContent = msg;
            nameEl.className = "text-xl font-bold mb-4 text-white font-sans";
            document.getElementById('result-title').textContent = "";

            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('result-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function capitalize(str) { return str.charAt(0).toUpperCase() + str.slice(1); }
        function toggleDropdown() { document.getElementById('dropdown-menu').classList.toggle('hidden'); }

        function selectRole(value, htmlContent) {
            document.getElementById('role-select').value = value;
            document.getElementById('dropdown-selected-text').innerHTML = htmlContent;
            document.getElementById('dropdown-menu').classList.add('hidden');
            // Re-renderizar la UI al cambiar el filtro
            renderUI();
        }

        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('custom-role-dropdown');
            if (dropdown && !dropdown.contains(event.target)) {
                document.getElementById('dropdown-menu').classList.add('hidden');
            }
        });

        function redirectToDeepLOL(event) {
            event.preventDefault();
            const summonerText = document.getElementById('summoner-name-input').value.trim();
            if (!summonerText) return;
            let name = summonerText;
            let tag = "";
            if (summonerText.includes('#')) {
                const parts = summonerText.split('#');
                name = parts[0].trim();
                tag = parts[1] ? parts[1].trim() : "";
            }
            const fullID = `${name}-${tag}`;
            const encodedID = encodeURIComponent(fullID);
            window.open(`https://www.deeplol.gg/summoner/euw/${encodedID}`, "_blank");
        }

        document.getElementById("summoner-name-input").addEventListener("input", function () {
            localStorage.setItem("summonerName", this.value);
        });

        window.addEventListener("load", function () {
            const savedName = localStorage.getItem("summonerName");
            if (savedName) {
                document.getElementById("summoner-name-input").value = savedName;
            }
        });

        const profileFrame = document.getElementById('profile-frame');
        const fileInput = document.getElementById('profile-upload');
        const profileImg = document.getElementById('profile-img');
        const placeholder = document.getElementById('profile-placeholder');

        const savedImage = localStorage.getItem('profilePhoto');
        if (savedImage) {
            profileImg.src = savedImage;
            profileImg.classList.remove('hidden');
            placeholder.classList.add('hidden');
        }

        profileFrame.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageData = e.target.result;
                    profileImg.src = imageData;
                    profileImg.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    localStorage.setItem('profilePhoto', imageData);
                };
                reader.readAsDataURL(file);
            }
            event.target.value = ''; 
        });

        function actualizarBotonOpgg(champId) {
            const opggLink = document.getElementById('opgg-link');
            if (opggLink && champId) {
                let championKey = champId.toLowerCase();
                opggLink.href = `https://www.op.gg/champions/${championKey}/build`;
            } else if (opggLink) {
                opggLink.href = "#";
            }
        }
    </script>
</body>
</html>
